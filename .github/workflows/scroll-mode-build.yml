name: Build Weasel with Scroll Mode

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Boost
      run: |
        $boost_url = "https://archives.boost.io/release/1.90.0/source/boost_1_90_0.7z"
        Invoke-WebRequest -Uri $boost_url -OutFile boost.7z
        7z x boost.7z -oC:\
        echo "BOOST_ROOT=C:\boost_1_90_0" >> $env:GITHUB_ENV
    
    - name: Build
      run: |
        .\build.bat all
      shell: cmd
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: weasel-build
        path: output/
